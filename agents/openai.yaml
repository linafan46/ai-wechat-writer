interface:
  display_name: "AI 热点公众号创作"
  short_description: "随机生成一篇微信公众号短观点文章与暖白极简风格封面图"
  default_prompt: "使用 $ai-wechat-writer 随机生成一篇适合微信公众号发布的中文短观点文章和匹配封面图。主题以 AI 相关为主，也可写 AI+审美、AI+个人成长，或不直接结合 AI 但符合账号气质的审美、判断力、个人成长话题。先浏览并核实最近几天的热点或可靠事实入口，优先使用官方发布、产品博客、研究论文等一手来源。文章只表达一个清晰观点，热点只做入口，落点是普通人的能力、工作或成长启发。正文控制在 150 到 500 字，短句、克制换行、重点加粗，不写新闻汇总或鸡汤。生成与正文使用同一个核心隐喻的暖白极简 3D 封面图，避免科技蓝、霓虹、电路、机器人和密集文字。交付标题、25 字以内摘要、正文、封面图、封面提示词、事实来源链接，并明确区分已确认事实与个人判断。"
