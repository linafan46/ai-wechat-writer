interface:
  display_name: "AI 公众号长文创作"
  short_description: "生成有叙事逻辑的 AI 公众号中长文、摘要、封面和文中配图"
  default_prompt: "使用 $ai-wechat-longform-writer 根据最新 AI 热点、AI 观点、技术趋势、AI+个人成长或工作方式话题，生成一篇适合微信公众号发布的中文中长文。先浏览并核实可靠事实来源，优先使用官方博客、产品发布、研究论文或权威机构文章。文章不要写成新闻摘要，要从普通人熟悉的具体场景切入，指出问题，再引入事实信号，用一个直观类比解释，比如电力进入工厂、手机爆发前夜、助理进入办公室等，最后落到个人工作方式、知识沉淀或成长判断。正文约 900 到 1800 字，段落完整，少量关键短句即可，不要机械一行一句。正文中加入 2 到 5 个黑底白字分割卡作为章节分割和逻辑路标，不要写“小结”。交付标题、25 字以内摘要、正文、黑底白字分割卡文案、封面图或封面提示词、2 到 4 张文中配图提示词、事实来源链接，并区分事实与个人判断。"
