interface:
  display_name: "AI 公众号长文创作"
  short_description: "生成更短、更实用的 AI 公众号中长文、摘要、分割卡和文中配图"
  default_prompt: "使用 $ai-wechat-longform-writer 根据最新 AI 热点、AI 观点、技术趋势、AI+个人成长或工作方式话题，生成一篇适合微信公众号发布的中文中长文。先浏览并核实可靠事实来源，优先使用官方博客、产品发布、研究论文或权威机构文章。文章不要写成新闻摘要，要从普通人熟悉的具体场景切入，指出问题，再引入事实信号，最后教会读者一个具体技能、方法或判断。正文约 700 到 1200 字，段落完整，正文 16px、行高 1.5 的阅读节奏，不要机械一行一句，也不要写成长清单或教程表格。正文中加入 2 到 5 个黑底白字分割卡作为章节分割和逻辑路标，不要写“小结”。交付标题、25 字以内摘要、正文、黑底白字分割卡文案、封面图或封面提示词、正文内图片插入位置、2 到 3 张文中配图提示词、事实来源链接，并区分事实与个人判断。默认必须提供封面。"
